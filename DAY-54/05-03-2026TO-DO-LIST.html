<!doctype html>
<html>
  <head>
    <title>Basic To-Do List</title>
    <link rel="stylesheet" href="05-03-2026TO-DO-LIST.css" />
  </head>

  <body>
    <div class="container">
      <h2>TO-DO-LIST</h2>

      <input type="text" id="taskInput" placeholder="Enter task" />

      <input type="date" id="taskDate" />

      <input type="time" id="taskTime" />

      <button onclick="addTask()">Add Task</button>

      <ul id="taskList"></ul>
    </div>

    <script src="05-03-2026TO-DO-LIST.js"></script>
  </body>
</html>
