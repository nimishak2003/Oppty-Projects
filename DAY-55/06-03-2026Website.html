<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple E-Commerce</title>
    <link rel="stylesheet" href="06-03-2026Website.css" />
  </head>
  <body>
    <header>
      <div class="logo">ShopHub</div>

      <div>
        <span class="cart">Cart: <span id="cart">0</span></span>

        <nav>
          <button onclick="showStore()">Store</button>
          <button onclick="showAdmin()">Admin</button>
        </nav>

      </div>

    </header>

    <div class="container">

      <!-- STORE -->
      <div id="store">

        <h2>Trending Products</h2>
        <div class="products" id="productList"></div>

      </div>

      <!-- ADMIN -->
      <div id="admin" class="admin-panel">
        <div class="admin-box">
          <h2>Admin Dashboard</h2>

          <input id="name" placeholder="Product name" />
          <input id="emoji" placeholder="Emoji" />
          <input id="price" type="number" placeholder="Price ₹" />

          <button class="add-btn" onclick="addProduct()">Add Product</button>
        </div>

        <div class="admin-box">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Action</th>
              </tr>
            </thead>

            <tbody id="adminTable"></tbody>
          </table>
        </div>

      </div>
    </div>

    <script src="06-03-2026Website.js"></script>

  </body>
</html>
