<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //for loop
        for(let i=1;i<=5;i++){
            document.write(i+"<br>");
        }

        //while loop
        // let i=1;

        // while(i<=5){
        //     document.write("while:",i +"<br>");
        //     i++;
        // }

        //do while
        let i=1;
        do{
            document.write("DO-While:",i +"<br>");
            i++;
        }while(i<=5);

        //for of
        let fruits=["Apple", "Banana", "Mango"];

        for(let fruit of fruits){
            document.write("Fruit:",fruit+"<br>");
        }
    </script>
</body>
</html>
