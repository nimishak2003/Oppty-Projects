<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DesignFrame</title>
    <link rel="stylesheet" href="09-03-2026Design.css" />

  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <h1>DesignFrame</h1>
        <p>AI Creative Suite</p>
      </div>

      <div class="control-group">
        <label>✨ AI Image Generator</label>
        <textarea
          id="promptInput"
          placeholder="Describe the image..."
        ></textarea>
        <button id="generateBtn" class="btn-primary">Generate Image</button>
      </div>

      <div class="control-group">
        <label>Add Shapes</label>

        <div class="row">
          <button id="addSquare" class="btn-secondary">■ Square</button>
          <button id="addCircle" class="btn-secondary">● Circle</button>
        </div>
      </div>

      <div class="control-group">
        <label>Frame Background</label>
        <input
          type="color"
          id="bgColor"
          value="#ffffff"
          style="width: 100%; height: 30px"
        />
      </div>

      <div class="control-group">
        <label>Frame Roundness</label>
        <input type="range" id="roundness" min="0" max="150" value="12" />
      </div>

      <div class="control-group">
        <label>Boundary Preview</label>
        <button id="toggleBoundary" class="btn-secondary">
          Toggle Boundary
        </button>
      </div>

      <div class="sidebar-footer">
        <button id="clearCanvas" class="btn-danger">Clear Canvas</button>

        <button id="downloadBtn" class="btn-action">Download Frame</button>
      </div>
    </aside>

    <main class="canvas-area">
      <div id="canvas" class="canvas-container">
        <div id="placeholderText">
          Your canvas is empty<br />
          <small>Add shapes or generate an image</small>
        </div>
      </div>

      <div class="resolution-tag">Resolution: 600 x 450px</div>

      <script src="09-03-2026Design.js"></script>
    </main>
  </body>
</html>
